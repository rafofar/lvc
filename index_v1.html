<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bingo LVC</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f4f6fb}
header{position:sticky;top:0;background:#8e244d;color:#fff;padding:10px;z-index:1000}
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
button{background:#ff9800;color:#fff;border:none;padding:8px 12px;border-radius:8px;cursor:pointer}
input,select{padding:7px;border-radius:6px}
.stats{display:flex;gap:15px;margin-top:8px;font-weight:bold}
#winners{margin-top:8px;color:#ffeb3b;font-weight:bold}
#calledPills{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.pill{background:#4caf50;color:#fff;padding:4px 10px;border-radius:20px;cursor:pointer}
.cards{display:flex;flex-wrap:wrap;gap:12px;padding:12px}
.card{background:#fff;padding:8px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,.2)}
.card.winner{border:4px solid gold}
.grid{display:grid;grid-template-columns:repeat(5,42px);gap:3px}
.cell{width:42px;height:42px;background:#eee;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px}
.marked{background:#4caf50;color:#fff;font-weight:bold}
.free{background:#9c27b0;color:#fff}
</style>
</head>
<body>
<header>
<div class="controls">
<button onclick="addCards()">Agregar cartillas</button>
<button onclick="exportCards()">Exportar</button>
<input type="file" onchange="importCards(event)">
<input id="numInput" type="number" min="1" max="75" placeholder="Número">
<button onclick="addCalled()">Agregar número</button>
<button onclick="checkWinners()">Verificar números</button>
<button onclick="resetGame()">Limpiar partida</button>

<select id="pattern" onchange="updateSelectors();checkWinners();">
<option value="rowAny">Una fila</option>
<option value="rowSpecific">Fila específica</option>
<option value="colAny">Una columna</option>
<option value="colSpecific">Columna específica</option>
<option value="borderO">O (borde)</option>
<option value="H">H</option>
<option value="diag">Diagonal</option>
<option value="crossX">Cruz diagonal</option>
<option value="crossPlus">Cruz recta</option>
<option value="full">Apagón</option>
</select>

<select id="rowSel" onchange="checkWinners()">
<option value="0">Fila 1</option><option value="1">Fila 2</option>
<option value="2">Fila 3</option><option value="3">Fila 4</option>
<option value="4">Fila 5</option>
</select>

<select id="colSel" onchange="checkWinners()">
<option value="0">B</option><option value="1">I</option>
<option value="2">N</option><option value="3">G</option>
<option value="4">O</option>
</select>
</div>

<div class="stats">
<div>📋 Cartillas: <span id="cardCount">0</span></div>
<div>🎱 Cantados: <span id="calledCount">0</span></div>
<div>🥇 Ganadores: <span id="winnerCount">0</span></div>
</div>

<div id="calledPills"></div>
<div id="winners">🏆 Ganadores: Ninguno</div>
</header>

<div id="cards" class="cards"></div>

<script>
let cards=JSON.parse(localStorage.getItem("bingoCards")||"[]");
let called=[];

function save(){localStorage.setItem("bingoCards",JSON.stringify(cards));}

function numsToGrid(nums){
 let g=[],k=0;
 for(let r=0;r<5;r++){
   g[r]=[];
   for(let c=0;c<5;c++){
     g[r][c]=(r===2&&c===2)?"FREE":nums[k++];
   }
 }
 return g;
}

function addCards(){
 let txt=prompt("Una línea por cartilla (24 números separados por comas)");
 if(!txt) return;
 txt.trim().split(/\n+/).forEach(line=>{
   let n=line.split(",").map(x=>parseInt(x.trim())).filter(x=>!isNaN(x));
   if(n.length===24) cards.push(numsToGrid(n));
 });
 save(); render();
}

function addCalled(){
 let n=parseInt(document.getElementById("numInput").value);
 if(n>=1&&n<=75&&!called.includes(n)){called.push(n);called.sort((a,b)=>a-b);render();}
}

function removeCalled(n){
 called=called.filter(x=>x!==n);
 render();
}

function marked(card,r,c){
 return card[r][c]==="FREE" || called.includes(Number(card[r][c]));
}

function checkPattern(card){
 let p=document.getElementById("pattern").value;

 if(p==="rowAny"){
   for(let r=0;r<5;r++){ let ok=true;
     for(let c=0;c<5;c++) if(!marked(card,r,c)) ok=false;
     if(ok) return true;
   }
   return false;
 }

 if(p==="rowSpecific"){
   let r=+rowSel.value;
   for(let c=0;c<5;c++) if(!marked(card,r,c)) return false;
   return true;
 }

 if(p==="colAny"){
   for(let c=0;c<5;c++){ let ok=true;
     for(let r=0;r<5;r++) if(!marked(card,r,c)) ok=false;
     if(ok) return true;
   }
   return false;
 }

 if(p==="colSpecific"){
   let c=+colSel.value;
   for(let r=0;r<5;r++) if(!marked(card,r,c)) return false;
   return true;
 }

 if(p==="borderO"){
   const pts=[];
   for(let i=0;i<5;i++){pts.push([0,i],[4,i],[i,0],[i,4]);}
   return [...new Set(pts.map(p=>p.join(",")))].every(v=>{
      let [r,c]=v.split(",").map(Number); return marked(card,r,c);
   });
 }

 if(p==="H"){
   const pts=[[0,0],[1,0],[2,0],[3,0],[4,0],[0,4],[1,4],[2,4],[3,4],[4,4],[2,1],[2,2],[2,3]];
   return pts.every(([r,c])=>marked(card,r,c));
 }

 if(p==="diag"){
   let d1=true,d2=true;
   for(let i=0;i<5;i++){d1&=marked(card,i,i);d2&=marked(card,i,4-i);}
   return d1||d2;
 }

 if(p==="crossX"){
   for(let i=0;i<5;i++) if(!marked(card,i,i)||!marked(card,i,4-i)) return false;
   return true;
 }

 if(p==="crossPlus"){
   for(let i=0;i<5;i++) if(!marked(card,2,i)||!marked(card,i,2)) return false;
   return true;
 }

 if(p==="full"){
   for(let r=0;r<5;r++) for(let c=0;c<5;c++) if(!marked(card,r,c)) return false;
   return true;
 }
 return false;
}

function matches(card){
 let m=0;
 for(let r=0;r<5;r++) for(let c=0;c<5;c++) if(marked(card,r,c)) m++;
 return m-1; // sin FREE
}

function checkWinners(){
 let wins=[];
 document.querySelectorAll(".card").forEach(c=>c.classList.remove("winner"));

 cards.forEach((card,i)=>{
   if(checkPattern(card)){
      wins.push(i+1);
      let el=document.getElementById("card_"+i);
      if(el) el.classList.add("winner");
   }
 });

 document.getElementById("winnerCount").textContent=wins.length;
 document.getElementById("winners").textContent="🏆 Ganadores: "+(wins.length?wins.map(x=>"#"+x).join(", "):"Ninguno");
}

function updateSelectors(){
 rowSel.disabled=pattern.value!=="rowSpecific";
 colSel.disabled=pattern.value!=="colSpecific";
}

function render(){
 cardsDiv=document.getElementById("cards");
 cardsDiv.innerHTML="";

 cards.forEach((card,i)=>{
   let html='<div class="card" id="card_'+i+'"><b>Cartilla #'+(i+1)+'</b><br>Coincidencias: '+matches(card)+'/24<br><div class="grid">';
   card.forEach(r=>r.forEach(v=>{
      let cls="";
      if(v==="FREE") cls="free marked";
      else if(called.includes(Number(v))) cls="marked";
      html+='<div class="cell '+cls+'">'+v+'</div>';
   }));
   html+='</div></div>';
   cardsDiv.innerHTML+=html;
 });

 calledPills.innerHTML="";
 called.forEach(n=>{
   let s=document.createElement("span");
   s.className="pill";
   s.textContent=n+" ✕";
   s.onclick=()=>removeCalled(n);
   calledPills.appendChild(s);
 });

 cardCount.textContent=cards.length;
 calledCount.textContent=called.length;

 updateSelectors();
 checkWinners();
}

function resetGame(){called=[];render();}

function exportCards(){
 const a=document.createElement("a");
 a.href=URL.createObjectURL(new Blob([JSON.stringify(cards)],{type:"application/json"}));
 a.download="cartillas.json";
 a.click();
}

function importCards(e){
 const f=e.target.files[0];
 if(!f) return;
 const r=new FileReader();
 r.onload=()=>{cards=JSON.parse(r.result);save();render();};
 r.readAsText(f);
}

render();
</script>
</body>
</html>
